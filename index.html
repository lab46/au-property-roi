            "@type": "Answer",
            "text": "A good ROI for an Australian investment property is generally considered to be 7–10% per year when combining rental yield and capital growth. A gross rental yield of 4–6% is typical in major cities, while regional areas may offer higher yields of 6–8%."

          "name": "How is rental yield calculated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Gross rental yield = (Annual Rent / Property Purchase Price) × 100. Net rental yield subtracts all expenses (council rates, insurance, maintenance, property management) from annual rent before dividing by purchase price."
          }
        },

          "@type": "Question",

            "@type": "Answer",
            "text": "Key upfront costs include: stamp duty (varies by state and property value), legal/conveyancing fees ($1,500–$3,000), building and pest inspection ($500–$1,000), lenders mortgage insurance (if deposit is under 20%), and loan application fees."
          }
        },
        {
          "@type": "Question",
          "name": "How does capital growth affect property investment returns?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Capital growth compounds your property value over time. At 5% annual capital growth, a $500,000 property becomes approximately $2.16 million in 30 years. Capital growth is typically the dominant driver of long-term property investment returns in Australia."
          }
        },
        {
          "@type": "Question",
          "name": "What is negative gearing in property investment?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Negative gearing occurs when your rental income is less than your property expenses and loan repayments, resulting in a net loss. This loss can be offset against your taxable income in Australia, reducing your tax bill. Many investors accept negative cash flow in exchange for expected capital growth."
          }
        },
        {
          "@type": "Question",
          "name": "How much deposit do I need for an investment property in Australia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most lenders require a minimum 20% deposit for an investment property to avoid Lenders Mortgage Insurance (LMI). Some lenders accept 10–15% deposits with LMI added to the loan. First home buyers may qualify for government schemes with lower deposits."
          }
        }
